name: Build and Push Python Image to ACR

on:
  push:
    branches: [ "feature_wale" ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for GitHub OIDC -> Azure login

env:
  ACR_NAME: youracrname                 # e.g. mycompanyacr (no .azurecr.io)
  IMAGE_NAME: python-app                # repo/image name in ACR
  REGISTRY: youracrname.azurecr.io      # fully qualified ACR login server

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
